name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # Runs whenever you push code to your main branch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Inject Roboflow API Key
        run: |
          sed -i "s/__ROBOFLOW_KEY__/${{ secrets.ROBOFLOW_API_KEY }}/g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
