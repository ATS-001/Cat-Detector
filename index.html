<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Cat Detector</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .video-container { position: relative; display: inline-block; margin-top: 20px; border: 4px solid #333; border-radius: 8px; overflow: hidden; }
        video { display: block; width: 100%; max-width: 500px; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #status { color: #888; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Live Cat Detector</h1>
        <p id="status">Starting Camera Feed...</p>
        <div class="video-container">
            <video id="webcam" autoplay muted playsinline></video>
            <canvas id="overlay"></canvas>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status');

        // Handled securely by your GitHub Actions workflow secret
        const API_KEY = "__ROBOFLOW_KEY__"; 
        const MODEL_NAME = "cat-eugjv";
        const VERSION = "1";

        async function startApp() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;

                video.addEventListener('loadedmetadata', () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    statusText.innerText = "Cat Detector Active!";
                    statusText.style.color = "#4CAF50";
                    
                    // Run cloud API inference loop
                    setInterval(captureAndDetect, 1000); // Check once per second
                });
            } catch (err) {
                statusText.innerText = "Camera Error: " + err.message;
                statusText.style.color = "#ff4444";
            }
        }

        async function captureAndDetect() {
            // 1. Capture current video frame to an invisible canvas snapshot
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = video.videoWidth;
            tempCanvas.height = video.videoHeight;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            
            // 2. Convert to Base64 Data URL string
            const base64Image = tempCanvas.toDataURL('image/jpeg', 0.7).split(',')[1];

            // 3. Send securely via POST request to Roboflow's API
            try {
                const response = await fetch(`https://detect.roboflow.com/${MODEL_NAME}/${VERSION}?api_key=${API_KEY}`, {
                    method: "POST",
                    body: base64Image,
                    headers: { "Content-Type": "application/x-www-form-urlencoded" }
                });
                const data = await response.json();
                if(data.predictions) {
                    drawBoxes(data.predictions);
                }
            } catch (error) {
                console.error("Inference Error:", error);
            }
        }

        function drawBoxes(predictions) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            predictions.forEach(pred => {
                ctx.strokeStyle = "#00FF00";
                ctx.lineWidth = 4;
                ctx.strokeRect(pred.x - pred.width/2, pred.y - pred.height/2, pred.width, pred.height);

                ctx.fillStyle = "#00FF00";
                ctx.font = "18px Arial";
                const label = `${pred.class} (${Math.round(pred.confidence * 100)}%)`;
                ctx.fillRect(pred.x - pred.width/2, pred.y - pred.height/2 - 25, ctx.measureText(label).width + 10, 25);

                ctx.fillStyle = "black";
                ctx.fillText(label, pred.x - pred.width/2 + 5, pred.y - pred.height/2 - 6);
            });
        }
        startApp();
    </script>
</body>
</html>
